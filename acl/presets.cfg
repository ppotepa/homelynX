# Homelynx ACL presets.
#
# Defines named profiles (presets) that can be referenced by name from
# allowed-users.cfg instead of spelling out a full selector expression.
#
# Format:
#   <PRESET_NAME> <rule-expression>
#
# A rule-expression uses the same selector syntax as allowed-users.cfg: one
# or more '|'-separated selectors, each a legacy tier (ALL/SAY/ADMIN/PUBLIC),
# a capability name (system.status), a module (tts, torrent), or a command
# with/without the leading slash (list or /list). Prefix a selector with '!'
# to deny it.
#
# Built-in fallback presets (always available even if this file is missing
# or doesn't redefine them):
#   USER  ALL
#   ADMIN ADMIN
#
# You can override the built-ins or add your own presets here, e.g.:
#   MODERATOR ALL|system.config|!torrent.download_candidate
#
# Then reference a preset by name from allowed-users.cfg:
#   @bravuraK ADMIN
#   @ops MODERATOR
#   8153696940 USER

USER ALL
ADMIN ADMIN
